services:
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: production-dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dashboard-network

  server:
    build: ./server
    container_name: dashboard-server
    restart: always
    environment:
      NODE_ENV: development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: production-dashboard
    depends_on:
      - postgres
    networks:
      - dashboard-network

  client:
    build: ./client
    container_name: dashboard-client
    restart: always
    networks:
      - dashboard-network

  nginx:
    image: nginx:stable-alpine
    container_name: dashboard-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - dashboard-network

volumes:
  postgres_data:

networks:
  dashboard-network:
    driver: bridge